<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#f0f4ff" media="(prefers-color-scheme: light)" />
<title>Catálogo de Produtos</title>

  window.CATALOG_TITLE   = "Catálogo";

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
:root {
  --violet:      #7c3aed;
  --violet-dim:  #6d28d9;
  --violet-glow: #a78bfa;
  --blue:        #3b82f6;
  --blue-light:  #93c5fd;
  --muted:       #94a3b8;
  --border:      rgba(148,163,184,.18);
  --radius:      16px;
  --radius-sm:   10px;
  --radius-pill: 999px;

  /* tema claro */
  --bg:          #f0f4ff;
  --surface:     #ffffff;
  --surface-2:   #e8eeff;
  --text:        #0f172a;
  --text-sub:    #475569;
  --chip-bg:     #ffffff;
  --chip-border: #c7d2fe;
  --price-col:   #7c3aed;
  --header-bg:   rgba(240,244,255,.9);
  --shadow-card: 0 2px 8px rgba(15,23,42,.07),0 0 0 1px rgba(99,102,241,.06);
  --shadow-hover:0 8px 28px rgba(124,58,237,.16),0 2px 8px rgba(15,23,42,.1);
  --shadow-lb:   0 32px 64px rgba(15,23,42,.32);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:          #080f1f;
    --surface:     #0f172a;
    --surface-2:   #1e293b;
    --text:        #f1f5f9;
    --text-sub:    #94a3b8;
    --chip-bg:     #1e293b;
    --chip-border: rgba(124,58,237,.4);
    --price-col:   #a78bfa;
    --header-bg:   rgba(8,15,31,.9);
    --shadow-card: 0 2px 8px rgba(0,0,0,.4),0 0 0 1px rgba(124,58,237,.12);
    --shadow-hover:0 8px 28px rgba(124,58,237,.28),0 2px 8px rgba(0,0,0,.3);
    --shadow-lb:   0 32px 64px rgba(0,0,0,.72);
  }
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--text);
  font-family:"Plus Jakarta Sans",system-ui,sans-serif;
  font-size:15px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  min-height:100dvh;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 40% at 10% -10%,rgba(124,58,237,.11) 0%,transparent 60%),
    radial-gradient(ellipse 55% 28% at 92% 108%,rgba(59,130,246,.09) 0%,transparent 60%);
}
button,input{font:inherit;color:inherit;background:none;border:none}
img{display:block;max-width:100%}

/* ── HEADER ── */
.site-header{
  position:sticky;top:0;z-index:50;
  background:var(--header-bg);
  backdrop-filter:saturate(180%) blur(16px);
  -webkit-backdrop-filter:saturate(180%) blur(16px);
  border-bottom:1px solid var(--border);
}
.header-inner{max-width:1320px;margin:0 auto;padding:14px 18px 0}

.brand-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.brand-logo{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--violet),var(--blue));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(124,58,237,.38);
}
.brand-icon svg{width:19px;height:19px;color:#fff}
.brand-texts{display:flex;flex-direction:column}
.brand-title{
  font-family:"Syne",sans-serif;font-weight:800;
  font-size:clamp(20px,4.5vw,26px);line-height:1;letter-spacing:-.025em;
  background:linear-gradient(115deg,var(--text) 45%,var(--violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.brand-sub{font-size:10.5px;color:var(--text-sub);letter-spacing:.07em;text-transform:uppercase;font-weight:600;margin-top:2px}

.count-pill{
  font-family:"Syne",sans-serif;font-size:11px;font-weight:700;
  color:var(--violet-glow);
  background:rgba(124,58,237,.14);
  border:1px solid rgba(124,58,237,.28);
  padding:4px 11px;border-radius:var(--radius-pill);
  white-space:nowrap;letter-spacing:.03em;
}

.search-wrap{position:relative;margin-bottom:12px}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--muted);pointer-events:none}
.search-wrap input{
  width:100%;padding:11px 14px 11px 42px;
  background:var(--surface);border:1.5px solid var(--chip-border);
  border-radius:var(--radius-sm);outline:none;font-size:14px;
  transition:border-color .15s,box-shadow .15s;
}
.search-wrap input:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(124,58,237,.14)}
.search-wrap input::placeholder{color:var(--muted)}

.filter-row{
  display:flex;gap:7px;overflow-x:auto;overflow-y:hidden;
  padding:2px 0 14px;margin:0 -18px;padding-left:18px;padding-right:18px;
  scrollbar-width:none;
}
.filter-row::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:7px 15px;
  background:var(--chip-bg);border:1.5px solid var(--chip-border);
  border-radius:var(--radius-pill);font-family:"Syne",sans-serif;
  font-size:12px;font-weight:700;color:var(--text-sub);cursor:pointer;
  white-space:nowrap;transition:all .18s ease;-webkit-tap-highlight-color:transparent;
  letter-spacing:.01em;
}
.chip:hover{border-color:var(--violet);color:var(--violet)}
.chip.active{
  background:linear-gradient(135deg,var(--violet),var(--blue));
  border-color:transparent;color:#fff;
  box-shadow:0 4px 14px rgba(124,58,237,.38);
}
.chip .n{margin-left:5px;opacity:.6;font-size:10.5px;font-weight:600}

/* ── GRID ── */
main{
  position:relative;z-index:1;
  max-width:1320px;margin:0 auto;
  padding:18px 14px 100px;
}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:520px){.grid{grid-template-columns:repeat(3,1fr);gap:14px}}
@media(min-width:780px){.grid{grid-template-columns:repeat(4,1fr);gap:16px}}
@media(min-width:1060px){.grid{grid-template-columns:repeat(5,1fr)}}
@media(min-width:1280px){.grid{grid-template-columns:repeat(6,1fr)}}

/* ── CARD ── */
.card{
  background:var(--surface);border-radius:var(--radius);
  box-shadow:var(--shadow-card);border:1px solid var(--border);
  overflow:hidden;cursor:pointer;display:flex;flex-direction:column;
  transition:transform .28s cubic-bezier(.2,.8,.2,1),box-shadow .28s;
  -webkit-tap-highlight-color:transparent;
  animation:riseUp .45s cubic-bezier(.2,.8,.2,1) backwards;
}
@keyframes riseUp{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
@media(hover:hover){.card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}}
.card:active{transform:scale(.975)}

.card-img{
  aspect-ratio:1/1;overflow:hidden;
  background:var(--surface-2);position:relative;
}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.2,.8,.2,1)}
@media(hover:hover){.card:hover .card-img img{transform:scale(1.06)}}

.cat-badge{
  position:absolute;top:8px;left:8px;
  background:linear-gradient(135deg,var(--violet),var(--blue));
  color:#fff;font-family:"Syne",sans-serif;
  font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  padding:3px 8px;border-radius:var(--radius-pill);
  box-shadow:0 2px 8px rgba(124,58,237,.4);
}

.card-img.broken{
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:6px;color:var(--muted);
  font-size:11px;text-align:center;padding:12px;
}
.card-img.broken svg{width:26px;height:26px;opacity:.35}

.card-body{padding:10px 13px 14px;display:flex;flex-direction:column;flex:1;gap:3px}
.card-name{
  font-family:"Syne",sans-serif;font-size:13px;font-weight:700;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-desc{
  font-size:11.5px;color:var(--text-sub);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-price{
  margin-top:auto;padding-top:9px;
  font-family:"Plus Jakarta Sans",sans-serif;font-weight:600;
  font-size:15px;color:var(--price-col);line-height:1;
  font-variant-numeric:tabular-nums;
}
.card-price .curr{font-size:11px;font-weight:500;opacity:.75;vertical-align:.12em;margin-right:1px}
.card-price .val{font-size:17px;font-weight:700;letter-spacing:-.01em}

/* ── ESTADOS ── */
.state{text-align:center;padding:72px 24px}
.state-icon{
  width:56px;height:56px;border-radius:50%;
  background:rgba(124,58,237,.1);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
}
.state-icon svg{width:26px;height:26px;color:var(--violet)}
.state h2{font-family:"Syne",sans-serif;font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
.state p{color:var(--text-sub);font-size:14px;max-width:48ch;margin:0 auto 14px}
.state code{display:inline-block;background:var(--surface-2);padding:3px 8px;border-radius:6px;font-size:12px;word-break:break-all;border:1px solid var(--border)}

.skel-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:520px){.skel-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:780px){.skel-grid{grid-template-columns:repeat(4,1fr)}}
.skel-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.skel-img{aspect-ratio:1/1;background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
.skel-body{padding:12px 14px}
.skel-line{height:10px;border-radius:5px;background:var(--surface-2);margin-bottom:7px;animation:shimmer 1.5s infinite}
.skel-line.w60{width:60%}.skel-line.w40{width:40%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── LIGHTBOX ── */
.lb-overlay{
  position:fixed;inset:0;
  background:rgba(8,15,31,.82);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:100;display:none;align-items:flex-end;justify-content:center;
}
@media(min-width:600px){.lb-overlay{align-items:center;padding:20px}}
.lb-overlay.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.lb-sheet{
  background:var(--surface);width:100%;max-width:560px;
  max-height:92dvh;overflow-y:auto;
  border-radius:24px 24px 0 0;
  box-shadow:var(--shadow-lb);
  animation:slideUp .3s cubic-bezier(.2,.8,.2,1);
  position:relative;
}
@media(min-width:600px){.lb-sheet{border-radius:24px;animation:zoomIn .25s cubic-bezier(.2,.8,.2,1)}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
@keyframes zoomIn{from{transform:scale(.93);opacity:0}to{transform:none;opacity:1}}

.lb-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
@media(min-width:600px){.lb-handle{display:none}}

.lb-img-wrap{position:relative}
.lb-img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--surface-2)}
.lb-img-wrap::after{
  content:"";position:absolute;bottom:0;left:0;right:0;height:55%;
  background:linear-gradient(to top,var(--surface),transparent);pointer-events:none;
}
.lb-close{
  position:absolute;top:14px;right:14px;width:34px;height:34px;
  border-radius:50%;background:rgba(15,23,42,.55);
  backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;border:1px solid rgba(255,255,255,.15);
}
.lb-close svg{width:16px;height:16px;color:#fff}

.lb-body{padding:0 20px 28px;position:relative;z-index:1;margin-top:-28px}

.lb-cat-pill{
  display:inline-flex;align-items:center;
  background:linear-gradient(135deg,var(--violet),var(--blue));
  color:#fff;font-family:"Syne",sans-serif;
  font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:4px 12px;border-radius:var(--radius-pill);margin-bottom:10px;
}
.lb-name{
  font-family:"Syne",sans-serif;font-size:clamp(20px,5vw,26px);
  font-weight:800;letter-spacing:-.02em;line-height:1.15;margin-bottom:8px;
}
.lb-desc{color:var(--text-sub);font-size:14px;line-height:1.6;margin-bottom:18px}
.lb-footer{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface-2);border-radius:14px;
  padding:14px 18px;border:1px solid var(--border);
}
.lb-price-label,.lb-cod-label{
  font-size:10.5px;color:var(--text-sub);font-weight:600;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;
}
.lb-price-val{
  font-family:"Plus Jakarta Sans",sans-serif;font-weight:700;
  font-size:24px;color:var(--price-col);line-height:1;
  font-variant-numeric:tabular-nums;letter-spacing:-.01em;
}
.lb-cod{text-align:right}
.lb-cod-val{font-family:"Syne",sans-serif;font-size:15px;font-weight:700;letter-spacing:.04em}

footer{
  position:relative;z-index:1;text-align:center;
  padding:20px;color:var(--muted);font-size:11.5px;
  border-top:1px solid var(--border);
}
footer span{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--violet);margin:0 6px;vertical-align:middle;
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

<script>
(()=>{
"use strict";

function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const rows=[];let row=[],field="",inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else inQ=false;}else field+=c;}
    else{
      if(c==='"')inQ=true;
      else if(c===','){row.push(field);field="";}
      else if(c==='\n'){row.push(field);rows.push(row);row=[];field="";}
      else if(c!=='\r')field+=c;
    }
  }
  if(row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.some(v=>v.trim()));
}

const ALIASES={
  name:    ["produto","nome","item","titulo","título","name","title"],
  category:["categoria","category","tipo","grupo"],
  desc:    ["descricao","descrição","description","detalhes","obs"],
  price:   ["valor","preco","preço","price"],
  link:    ["link","url","drive","imagem_url","image_url"],
  image:   ["imagem","foto","image","img"],
  code:    ["codigo","código","code","cod","ref"]
};

function buildIdx(headers){
  const idx={name:-1,category:-1,desc:-1,price:-1,link:-1,image:-1,code:-1};
  const n=h=>h.toLowerCase().trim().replace(/\s+/g," ");
  headers.forEach((h,i)=>{
    const hn=n(h);
    for(const k in ALIASES)if(idx[k]===-1&&ALIASES[k].includes(hn)){idx[k]=i;return;}
  });
  return idx;
}

function driveId(val){
  if(!val)return null;
  const v=val.trim();
  let m=v.match(/\/d\/([\w-]{20,})/);if(m)return m[1];
  m=v.match(/[?&]id=([\w-]{20,})/);if(m)return m[1];
  if(/^[\w-]{20,}$/.test(v))return v;
  m=v.match(/([\w-]{20,})/);if(m)return m[1];
  return null;
}

/* Retorna URL de imagem: aceita URL direta (GitHub/qualquer CDN) ou extrai ID do Drive */
function imgUrl(val,sz=400){
  if(!val||!val.trim())return null;
  const v=val.trim();
  // Se já é URL direta (não é Drive) — usa direto
  if(v.startsWith("http")&&!v.includes("drive.google.com")&&!v.includes("docs.google.com")){
    return v;
  }
  // URL do Drive — extrai ID e usa thumbnail API
  const id=driveId(v);
  if(!id)return null;
  return `https://drive.google.com/thumbnail?id=${id}&sz=w${sz}`;
}

function parsePrice(raw){
  if(!raw)return null;
  let s=String(raw).replace(/[^\d.,-]/g,"").trim();
  if(!s)return null;
  if(s.includes(",")&&s.includes("."))s=s.replace(/\./g,"").replace(",",".");
  else if(s.includes(","))s=s.replace(",",".");
  const n=parseFloat(s);
  return Number.isFinite(n)?n:null;
}
const fmt=new Intl.NumberFormat(window.CURRENCY_LOCALE||"pt-BR",{style:"currency",currency:window.CURRENCY_CODE||"BRL"});
const fmtP=(n,raw)=>n!=null?fmt.format(n):(raw||"—");

const S={items:[],cat:"Tudo",q:""};
const $=id=>document.getElementById(id);

const elMain=$("js-main"),elFilters=$("js-filters"),elCount=$("js-count"),elSearch=$("js-search");
const elLb=$("js-lb"),lbImg=$("lb-img"),lbCat=$("lb-cat"),lbName=$("lb-name");
const lbDesc=$("lb-desc"),lbPrice=$("lb-price"),lbCod=$("lb-cod"),lbCodWrap=$("lb-cod-wrap");

document.title=window.CATALOG_TITLE||"Catálogo";
$("js-title").textContent=window.CATALOG_TITLE||"Catálogo";
$("js-brand").textContent=window.CATALOG_BRAND||"";

const esc=s=>String(s??"").replace(/[&<>"']/g,m=>({'&':"&amp;",'<':"&lt;",'>':"&gt;",'"':"&quot;","'":'&#39;'}[m]));
const cap=s=>s?s.charAt(0).toUpperCase()+s.slice(1):s;

function showErr(title,msg,code){
  elMain.innerHTML=`<div class="state">
    <div class="state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg></div>
    <h2>${esc(title)}</h2><p>${esc(msg)}</p>${code?`<code>${esc(code)}</code>`:""}
  </div>`;
}

function renderFilters(){
  const counts={Tudo:S.items.length};
  S.items.forEach(p=>{const c=p.category||"Sem categoria";counts[c]=(counts[c]||0)+1;});
  const cats=["Tudo",...Object.keys(counts).filter(c=>c!=="Tudo").sort((a,b)=>a.localeCompare(b,"pt-BR"))];
  elFilters.innerHTML=cats.map(c=>
    `<button class="chip${c===S.cat?" active":""}" data-cat="${esc(c)}">${esc(cap(c))}<span class="n">${counts[c]}</span></button>`
  ).join("");
  elFilters.querySelectorAll(".chip").forEach(btn=>btn.addEventListener("click",()=>{
    S.cat=btn.dataset.cat;renderFilters();renderGrid();
  }));
}

function renderGrid(){
  const q=S.q.trim().toLowerCase();
  const list=S.items.filter(p=>{
    if(S.cat!=="Tudo"&&(p.category||"Sem categoria")!==S.cat)return false;
    if(q&&!`${p.name} ${p.desc||""} ${p.category||""}`.toLowerCase().includes(q))return false;
    return true;
  });
  elCount.textContent=`${list.length} ${list.length===1?"item":"itens"}`;
  if(!list.length){
    elMain.innerHTML=`<div class="state">
      <div class="state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></div>
      <h2>Nenhum resultado</h2><p>Tente outra categoria ou limpe a busca.</p>
    </div>`;
    return;
  }

  const grid=document.createElement("div");
  grid.className="grid";

  list.forEach((p,i)=>{
    // ── card ──────────────────────────────────────
    const card=document.createElement("article");
    card.className="card";
    card.style.animationDelay=`${Math.min(i*28,500)}ms`;

    // ── imagem ────────────────────────────────────
    const wrap=document.createElement("div");
    wrap.className="card-img";

    if(p.imageUrl){
      // badge de categoria
      if(p.category){
        const badge=document.createElement("span");
        badge.className="cat-badge";
        badge.textContent=cap(p.category);
        wrap.appendChild(badge);
      }

      const img=document.createElement("img");
      img.loading="lazy";
      img.decoding="async";
      img.alt=p.name;
      img.src=p.imageUrl; // atribuição direta — sem escaping, sem risco de corrupção

      // fallback em cadeia via addEventListener (sem inline onerror)
      let attempts=0;
      const fallbacks=[];
      if(p.driveId){
        fallbacks.push(`https://drive.google.com/uc?export=view&id=${p.driveId}`);
      }

      img.addEventListener("error",()=>{
        if(attempts < fallbacks.length){
          console.warn(`[Catálogo] Tentativa ${attempts+1} — fallback para:`, fallbacks[attempts]);
          img.src=fallbacks[attempts++];
          return;
        }
        // todas as tentativas falharam
        console.error(`[Catálogo] Imagem indisponível para "${p.name}":`, p.imageUrl);
        wrap.classList.add("broken");
        wrap.innerHTML="";
        const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
        svg.setAttribute("viewBox","0 0 24 24");svg.setAttribute("fill","none");
        svg.setAttribute("stroke","currentColor");svg.setAttribute("stroke-width","1.5");
        const rect=document.createElementNS("http://www.w3.org/2000/svg","rect");
        rect.setAttribute("x","3");rect.setAttribute("y","3");
        rect.setAttribute("width","18");rect.setAttribute("height","18");rect.setAttribute("rx","2");
        const path=document.createElementNS("http://www.w3.org/2000/svg","path");
        path.setAttribute("d","m9 9 6 6m0-6-6 6");
        svg.appendChild(rect);svg.appendChild(path);
        const span=document.createElement("span");
        span.textContent="sem imagem";
        wrap.appendChild(svg);wrap.appendChild(span);
      });

      wrap.appendChild(img);
    } else {
      // sem URL na planilha
      wrap.classList.add("broken");
      wrap.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m9 9 6 6m0-6-6 6"/></svg><span>sem imagem</span>';
    }

    // ── corpo do card ──────────────────────────────
    const body=document.createElement("div");
    body.className="card-body";

    const nameEl=document.createElement("div");
    nameEl.className="card-name";
    nameEl.textContent=p.name;
    body.appendChild(nameEl);

    if(p.desc){
      const descEl=document.createElement("div");
      descEl.className="card-desc";
      descEl.textContent=p.desc;
      body.appendChild(descEl);
    }

    const priceEl=document.createElement("div");
    priceEl.className="card-price";
    const raw=fmtP(p.price,p.priceRaw);
    const m=raw.match(/^(R\$\s*)(.+)$/);
    if(m){
      const curr=document.createElement("span");curr.className="curr";curr.textContent="R$";
      const val=document.createElement("span");val.className="val";val.textContent=m[2];
      priceEl.appendChild(curr);priceEl.appendChild(val);
    } else {
      priceEl.textContent=raw;
    }
    body.appendChild(priceEl);

    card.appendChild(wrap);
    card.appendChild(body);
    card.addEventListener("click",()=>openLb(p));
    grid.appendChild(card);
  });

  elMain.innerHTML="";
  elMain.appendChild(grid);
}

function openLb(p){
  if(p.imageUrl){
    lbImg.src=p.imageUrl.replace(/sz=w\d+/,"sz=w900");
    lbImg.style.display="block";
    const fb1=p.driveId?`https://drive.google.com/uc?export=view&id=${p.driveId}`:"";
    lbImg.dataset.fb=fb1;
    lbImg.onerror=function(){
      if(this.dataset.fb&&this.src!==this.dataset.fb){
        this.src=this.dataset.fb;this.dataset.fb="";return;
      }
      this.style.display="none";
    };
  } else {
    lbImg.style.display="none";
  }
  lbCat.textContent=cap(p.category||"Produto");
  lbName.textContent=p.name;
  lbDesc.textContent=p.desc||"";
  lbDesc.style.display=p.desc?"block":"none";
  lbPrice.textContent=fmtP(p.price,p.priceRaw);
  lbCod.textContent=p.code||"";
  lbCodWrap.style.display=p.code?"block":"none";
  elLb.classList.add("open");
  document.body.style.overflow="hidden";
}
function closeLb(){elLb.classList.remove("open");document.body.style.overflow="";}

$("lb-close").addEventListener("click",closeLb);
elLb.addEventListener("click",e=>{if(e.target===elLb)closeLb();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeLb();});

let ty=0;
$("js-lb-sheet").addEventListener("touchstart",e=>{ty=e.touches[0].clientY;},{passive:true});
$("js-lb-sheet").addEventListener("touchend",e=>{if(e.changedTouches[0].clientY-ty>60)closeLb();},{passive:true});

elSearch.addEventListener("input",e=>{S.q=e.target.value;renderGrid();});

async function init(){
  const url=window.SHEET_CSV_URL;
  if(!url||url.startsWith("COLE")){showErr("Configuração pendente","Cole a URL CSV da planilha no topo do arquivo.");return;}
  try{
    const res=await fetch(url,{cache:"no-store"});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const rows=parseCSV(await res.text());
    if(rows.length<2)throw new Error("Planilha sem dados");
    const idx=buildIdx(rows[0]);
    if(idx.name===-1)throw new Error(`Coluna de nome não encontrada. Cabeçalhos: ${rows[0].join(" | ")}`);
    S.items=rows.slice(1).map(r=>{
      const name=(r[idx.name]||"").trim();
      if(!name)return null;
      const rawLink =idx.link >=0?(r[idx.link] ||""):"";
      const rawImage=idx.image>=0?(r[idx.image]||""):"";
      const priceRaw=idx.price>=0?(r[idx.price]||"").trim():"";
      // URL direta (GitHub/CDN) tem prioridade; se for Drive, extrai ID para fallback
      const directUrl = imgUrl(rawLink,400)||imgUrl(rawImage,400);
      const did = (!directUrl||directUrl.includes("thumbnail"))
        ? (driveId(rawLink)||driveId(rawImage))
        : null;
      return{
        name,
        category:(idx.category>=0?r[idx.category]:"").trim()||null,
        desc:    (idx.desc    >=0?r[idx.desc]    :"").trim()||null,
        code:    (idx.code    >=0?r[idx.code]    :"").trim()||null,
        price:   parsePrice(priceRaw),
        priceRaw:priceRaw||null,
        driveId: did,
        imageUrl:directUrl
      };
    }).filter(Boolean);
    if(!S.items.length){showErr("Planilha vazia","Nenhuma linha com nome de produto encontrada.");return;}

    // ── diagnóstico no console (F12 → Console) ──────────────────────────
    console.log(`[Catálogo] ${S.items.length} produtos carregados`);
    console.log('[Catálogo] Colunas detectadas:', idx);
    console.log('[Catálogo] Amostra de URLs (primeiros 5):',
      S.items.slice(0,5).map(p=>({nome:p.name, imageUrl:p.imageUrl, driveId:p.driveId}))
    );
    const semImagem=S.items.filter(p=>!p.imageUrl);
    if(semImagem.length>0)
      console.warn(`[Catálogo] ${semImagem.length} produto(s) sem URL de imagem:`, semImagem.map(p=>p.name));
    // ────────────────────────────────────────────────────────────────────

    renderFilters();
    renderGrid();
  }catch(e){showErr("Erro ao carregar planilha","Verifique a URL CSV e as permissões.",e.message);}
}
init();
})();
</script>

</html>
