<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0e0e0c" media="(prefers-color-scheme: dark)" />
<title>Catálogo</title>

<!-- ============================================================
     CONFIGURAÇÃO — edite apenas esta seção
     ============================================================ -->
<script>
  // 1) URL CSV da planilha publicada na web.
  //    Como obter: Arquivo → Compartilhar → Publicar na web →
  //    Aba específica + "Valores separados por vírgula (.csv)" → Publicar
  //    Cole abaixo a URL gerada (termina em /pub?gid=...&single=true&output=csv)
  window.SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQCFo6CR0dZ9RqDEKRQ4ReSIIjNyYqdA8K0IdhorV7eIyZkknRT5gxF2hY0tzjw04tiKSmwwV_eBWTL/pub?gid=883949678&single=true&output=csv";

  // 2) Título e subtítulo do catálogo
  window.CATALOG_TITLE = "Catálogo";
  window.CATALOG_SUBTITLE = "Produtos disponíveis com valores de referência";

  // 3) Moeda para formatação automática (pode ser número puro na planilha)
  window.CURRENCY_LOCALE = "pt-BR";
  window.CURRENCY_CODE = "BRL";
</script>

<!-- Tipografia editorial -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />

<style>
  /* =========================================================
     Sistema de design — tema segue o sistema operacional
     ========================================================= */
  :root {
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface-2: #f3f1ec;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #e8e6e0;
    --accent: #1a1a1a;
    --accent-fg: #fafaf7;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
    --shadow-lg: 0 24px 48px rgba(0,0,0,.18);
    --radius: 14px;
    --radius-sm: 10px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e0e0c;
      --surface: #161614;
      --surface-2: #1f1f1c;
      --text: #f5f5f0;
      --text-muted: #9a988f;
      --border: #2a2a26;
      --accent: #f5f5f0;
      --accent-fg: #0e0e0c;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.4);
      --shadow-lg: 0 24px 48px rgba(0,0,0,.6);
    }
  }

  *, *::before, *::after { box-sizing: border-box; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Manrope", system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* Reset acessível */
  button, input { font: inherit; color: inherit; }
  img { display: block; max-width: 100%; height: auto; }

  /* =========================================================
     Header
     ========================================================= */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: saturate(180%) blur(14px);
    -webkit-backdrop-filter: saturate(180%) blur(14px);
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    padding: 18px 18px 12px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .brand {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 14px;
  }

  .brand h1 {
    font-family: "Instrument Serif", Georgia, serif;
    font-weight: 400;
    font-size: clamp(28px, 6vw, 42px);
    line-height: 1;
    letter-spacing: -0.01em;
    margin: 0;
  }

  .brand h1 em {
    font-style: italic;
    color: var(--text-muted);
  }

  .count-badge {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    white-space: nowrap;
    font-weight: 500;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 14px;
    margin: 0 0 14px;
    max-width: 60ch;
  }

  .search-box {
    position: relative;
    margin-bottom: 12px;
  }

  .search-box svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--text-muted);
    pointer-events: none;
  }

  .search-box input {
    width: 100%;
    padding: 12px 14px 12px 42px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    outline: none;
    transition: border-color .15s ease, box-shadow .15s ease;
  }

  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
  }

  .search-box input::placeholder { color: var(--text-muted); }

  /* Filtros chips com scroll horizontal */
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 4px 0 8px;
    margin: 0 -18px;
    padding-left: 18px;
    padding-right: 18px;
    scrollbar-width: none;
    -ms-overflow-style: none;
    scroll-snap-type: x proximity;
  }
  .filters::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all .15s ease;
    scroll-snap-align: start;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }

  .chip:hover { border-color: var(--text-muted); }

  .chip.active {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: var(--accent);
  }

  .chip .count {
    margin-left: 6px;
    opacity: .55;
    font-variant-numeric: tabular-nums;
    font-size: 11px;
  }

  /* =========================================================
     Grid de produtos
     ========================================================= */
  main {
    padding: 20px 18px 80px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  @media (min-width: 640px) {
    .grid { grid-template-columns: repeat(3, 1fr); gap: 18px; }
  }
  @media (min-width: 960px) {
    .grid { grid-template-columns: repeat(4, 1fr); gap: 22px; }
  }
  @media (min-width: 1280px) {
    .grid { grid-template-columns: repeat(5, 1fr); }
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform .25s cubic-bezier(.2,.8,.2,1), box-shadow .25s ease, border-color .2s ease;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    flex-direction: column;
    animation: fadeUp .4s cubic-bezier(.2,.8,.2,1) backwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (hover: hover) {
    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
      border-color: color-mix(in srgb, var(--text-muted) 50%, var(--border));
    }
  }

  .card:active { transform: scale(0.985); }

  .card-img {
    aspect-ratio: 1 / 1;
    background: var(--surface-2);
    overflow: hidden;
    position: relative;
  }

  .card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform .5s cubic-bezier(.2,.8,.2,1);
  }

  @media (hover: hover) {
    .card:hover .card-img img { transform: scale(1.04); }
  }

  .card-img.is-broken {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 11px;
    text-align: center;
    padding: 12px;
  }

  .card-body {
    padding: 12px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .card-cat {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-weight: 600;
  }

  .card-title {
    font-size: 14px;
    line-height: 1.3;
    margin: 0;
    font-weight: 600;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-desc {
    font-size: 12px;
    color: var(--text-muted);
    margin: 2px 0 0;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-price {
    margin-top: auto;
    padding-top: 10px;
    font-family: "Instrument Serif", Georgia, serif;
    font-size: 22px;
    line-height: 1;
    font-weight: 400;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }

  /* =========================================================
     Estados: loading, erro, vazio
     ========================================================= */
  .state {
    text-align: center;
    padding: 80px 24px;
    color: var(--text-muted);
  }

  .state h2 {
    font-family: "Instrument Serif", Georgia, serif;
    font-weight: 400;
    font-style: italic;
    font-size: 28px;
    color: var(--text);
    margin: 0 0 8px;
  }

  .state p { margin: 0 0 16px; max-width: 50ch; margin-inline: auto; font-size: 14px; }

  .state code {
    background: var(--surface-2);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    word-break: break-all;
  }

  .skeleton-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  @media (min-width: 640px) { .skeleton-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; } }
  @media (min-width: 960px) { .skeleton-grid { grid-template-columns: repeat(4, 1fr); gap: 22px; } }

  .skeleton {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .skeleton .sk-img { aspect-ratio: 1/1; background: linear-gradient(90deg, var(--surface-2), var(--border), var(--surface-2)); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
  .skeleton .sk-body { padding: 14px; }
  .skeleton .sk-line { height: 10px; background: var(--surface-2); border-radius: 4px; margin-bottom: 8px; }
  .skeleton .sk-line.short { width: 40%; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* =========================================================
     Lightbox
     ========================================================= */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    animation: fadeIn .2s ease;
  }
  .lightbox.is-open { display: flex; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .lightbox-inner {
    max-width: 600px;
    width: 100%;
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    animation: zoomIn .25s cubic-bezier(.2,.8,.2,1);
    max-height: calc(100dvh - 32px);
    overflow-y: auto;
  }

  @keyframes zoomIn { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .lightbox-inner img {
    width: 100%;
    aspect-ratio: 1/1;
    object-fit: cover;
    background: var(--surface-2);
  }

  .lightbox-body { padding: 20px 22px 24px; }
  .lightbox-cat {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .lightbox-title {
    font-family: "Instrument Serif", Georgia, serif;
    font-weight: 400;
    font-size: 28px;
    line-height: 1.1;
    margin: 0 0 10px;
    letter-spacing: -0.01em;
  }
  .lightbox-desc { color: var(--text-muted); font-size: 14px; margin: 0 0 16px; }
  .lightbox-price {
    font-family: "Instrument Serif", Georgia, serif;
    font-size: 32px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .lightbox-close {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
  }
  .lightbox-close svg { width: 18px; height: 18px; }

  footer {
    text-align: center;
    padding: 24px 16px;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 12px;
  }

  /* Reduz motion se o sistema pedir */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      transition-duration: .01ms !important;
    }
  }
</style>
</head>

      <div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>
      <div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>
      <div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>
      <div class="skeleton"><div class="sk-img"></div><div class="sk-body"><div class="sk-line"></div><div class="sk-line short"></div></div></div>

<script>
(() => {
  "use strict";

  // ===========================================================
  // Util: parser CSV resiliente (aspas, vírgulas, BOM, \r\n)
  // ===========================================================
  function parseCSV(text) {
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // remove BOM
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i];
      if (inQuotes) {
        if (c === '"') {
          if (text[i+1] === '"') { field += '"'; i++; }
          else { inQuotes = false; }
        } else field += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(field); field = ""; }
        else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ""; }
        else if (c === '\r') { /* skip */ }
        else field += c;
      }
    }
    if (field.length || row.length) { row.push(field); rows.push(row); }
    return rows.filter(r => r.some(v => v.trim().length > 0));
  }

  // ===========================================================
  // Mapa flexível de nomes de colunas (pt-br comum)
  // ===========================================================
  const FIELD_ALIASES = {
    name:     ["nome", "produto", "item", "titulo", "título", "descricao curta", "name", "title"],
    category: ["categoria", "category", "tipo", "grupo", "departamento", "secao", "seção"],
    desc:     ["descricao", "descrição", "description", "detalhes", "obs", "observacoes", "observações"],
    price:    ["preco", "preço", "valor", "price", "valor unitario", "valor unitário"],
    // Colunas que contêm URL/ID do Drive (prioridade: link > imagem, pois imagem pode ser só nome de arquivo)
    link:     ["link", "url", "drive", "imagem_url", "image_url", "foto_url"],
    image:    ["imagem", "foto", "image", "img"]
  };

  function buildIndex(headers) {
    const idx = { name: -1, category: -1, desc: -1, price: -1, image: -1, link: -1 };
    const norm = h => h.toLowerCase().trim().replace(/\s+/g, " ");
    headers.forEach((h, i) => {
      const n = norm(h);
      for (const key in FIELD_ALIASES) {
        if (idx[key] === -1 && FIELD_ALIASES[key].includes(n)) { idx[key] = i; return; }
      }
    });
    return idx;
  }

  // ===========================================================
  // Drive: extrai file ID de qualquer formato razoável
  // ===========================================================
  function extractDriveId(value) {
    if (!value) return null;
    const v = value.trim();
    // ID puro (geralmente 25+ chars alfanuméricos com - e _)
    if (/^[\w-]{25,}$/.test(v)) return v;
    // URL com /d/ID/ ou /d/ID
    let m = v.match(/\/d\/([\w-]{25,})/);
    if (m) return m[1];
    // URL com ?id=ID ou &id=ID
    m = v.match(/[?&]id=([\w-]{25,})/);
    if (m) return m[1];
    // qualquer ID de 25+ chars na string
    m = v.match(/([\w-]{25,})/);
    if (m) return m[1];
    return null;
  }

  function imageUrlFromDrive(value, size = 600) {
    const id = extractDriveId(value);
    if (!id) return null;
    return `https://lh3.googleusercontent.com/d/${id}=w${size}`;
  }

  // ===========================================================
  // Parsing de preço — aceita "R$ 1.234,56", "1234.56", número
  // ===========================================================
  function parsePrice(raw) {
    if (raw == null) return null;
    const s = String(raw).trim();
    if (!s) return null;
    // remove tudo que não for dígito, vírgula, ponto ou sinal
    let cleaned = s.replace(/[^\d.,\-]/g, "");
    if (!cleaned) return null;
    // se tem vírgula E ponto, assume formato pt-br: ponto = milhar, vírgula = decimal
    if (cleaned.includes(",") && cleaned.includes(".")) {
      cleaned = cleaned.replace(/\./g, "").replace(",", ".");
    } else if (cleaned.includes(",")) {
      // só vírgula → decimal pt-br
      cleaned = cleaned.replace(",", ".");
    }
    const n = parseFloat(cleaned);
    return Number.isFinite(n) ? n : null;
  }

  const formatter = new Intl.NumberFormat(window.CURRENCY_LOCALE || "pt-BR", {
    style: "currency",
    currency: window.CURRENCY_CODE || "BRL"
  });

  function formatPrice(n, fallback) {
    if (n == null) return fallback || "—";
    return formatter.format(n);
  }

  // ===========================================================
  // Render
  // ===========================================================
  const els = {
    title: document.getElementById("title"),
    subtitle: document.getElementById("subtitle"),
    countBadge: document.getElementById("count-badge"),
    search: document.getElementById("search"),
    filters: document.getElementById("filters"),
    content: document.getElementById("content"),
    skeleton: document.getElementById("skeleton"),
    lb: document.getElementById("lightbox"),
    lbImg: document.getElementById("lb-img"),
    lbCat: document.getElementById("lb-cat"),
    lbTitle: document.getElementById("lb-title"),
    lbDesc: document.getElementById("lb-desc"),
    lbPrice: document.getElementById("lb-price"),
    lbClose: document.getElementById("lightbox-close")
  };

  els.title.innerHTML = (window.CATALOG_TITLE || "Catálogo").replace(/\.$/, "<em>.</em>") || "Catálogo<em>.</em>";
  els.subtitle.textContent = window.CATALOG_SUBTITLE || "";

  const state = {
    items: [],
    activeCategory: "Tudo",
    query: ""
  };

  function showError(title, message, codeText) {
    els.content.innerHTML = `
      <div class="state">
        <h2>${title}</h2>
        <p>${message}</p>
        ${codeText ? `<code>${codeText}</code>` : ""}
      </div>`;
  }

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, m => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
    }[m]));
  }

  function renderFilters() {
    const counts = { "Tudo": state.items.length };
    state.items.forEach(p => {
      const cat = p.category || "Sem categoria";
      counts[cat] = (counts[cat] || 0) + 1;
    });
    const cats = ["Tudo", ...Object.keys(counts).filter(c => c !== "Tudo").sort((a,b) => a.localeCompare(b, "pt-BR"))];
    els.filters.innerHTML = cats.map(c =>
      `<button class="chip ${c === state.activeCategory ? "active" : ""}" data-cat="${escapeHtml(c)}" role="tab">
         ${escapeHtml(c)}<span class="count">${counts[c]}</span>
       </button>`
    ).join("");
    els.filters.querySelectorAll(".chip").forEach(btn => {
      btn.addEventListener("click", () => {
        state.activeCategory = btn.dataset.cat;
        renderFilters();
        renderGrid();
      });
    });
  }

  function renderGrid() {
    const q = state.query.trim().toLowerCase();
    const filtered = state.items.filter(p => {
      if (state.activeCategory !== "Tudo" && (p.category || "Sem categoria") !== state.activeCategory) return false;
      if (q) {
        const hay = `${p.name} ${p.desc || ""} ${p.category || ""}`.toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    els.countBadge.textContent = `${filtered.length} ${filtered.length === 1 ? "item" : "itens"}`;

    if (filtered.length === 0) {
      els.content.innerHTML = `
        <div class="state">
          <h2>Nada por aqui</h2>
          <p>Nenhum item corresponde aos filtros atuais. Tente outra categoria ou limpe a busca.</p>
        </div>`;
      return;
    }

    const grid = document.createElement("div");
    grid.className = "grid";
    grid.innerHTML = filtered.map((p, i) => `
      <article class="card" data-id="${i}" style="animation-delay:${Math.min(i * 24, 400)}ms">
        <div class="card-img" data-imgwrap>
          ${p.imageUrl
            ? `<img loading="lazy" decoding="async" src="${escapeHtml(p.imageUrl)}" alt="${escapeHtml(p.name)}" onerror="this.parentElement.classList.add('is-broken'); this.remove(); this.parentElement.textContent='imagem indisponível';">`
            : `<span>sem imagem</span>`}
        </div>
        <div class="card-body">
          ${p.category ? `<div class="card-cat">${escapeHtml(p.category)}</div>` : ""}
          <h3 class="card-title">${escapeHtml(p.name)}</h3>
          ${p.desc ? `<p class="card-desc">${escapeHtml(p.desc)}</p>` : ""}
          <div class="card-price">${formatPrice(p.price, p.priceRaw)}</div>
        </div>
      </article>
    `).join("");

    els.content.innerHTML = "";
    els.content.appendChild(grid);

    grid.querySelectorAll(".card").forEach((card, i) => {
      card.addEventListener("click", () => openLightbox(filtered[i]));
    });
  }

  function openLightbox(p) {
    els.lbImg.src = p.imageUrl ? p.imageUrl.replace(/=w\d+/, "=w1200") : "";
    els.lbImg.alt = p.name;
    els.lbImg.style.display = p.imageUrl ? "block" : "none";
    els.lbCat.textContent = p.category || "";
    els.lbCat.style.display = p.category ? "block" : "none";
    els.lbTitle.textContent = p.name;
    els.lbDesc.textContent = p.desc || "";
    els.lbDesc.style.display = p.desc ? "block" : "none";
    els.lbPrice.textContent = formatPrice(p.price, p.priceRaw);
    els.lb.classList.add("is-open");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    els.lb.classList.remove("is-open");
    document.body.style.overflow = "";
  }

  els.lbClose.addEventListener("click", closeLightbox);
  els.lb.addEventListener("click", e => { if (e.target === els.lb) closeLightbox(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeLightbox(); });

  els.search.addEventListener("input", e => {
    state.query = e.target.value;
    renderGrid();
  });

  // ===========================================================
  // Bootstrap
  // ===========================================================
  async function init() {
    const url = window.SHEET_CSV_URL;
    if (!url || url.startsWith("COLE_AQUI")) {
      showError(
        "Configuração pendente",
        "A URL CSV da planilha ainda não foi colada. Abra o arquivo HTML, localize a seção CONFIGURAÇÃO no topo do código e cole a URL gerada por «Arquivo → Compartilhar → Publicar na web → CSV»."
      );
      return;
    }

    try {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const rows = parseCSV(text);
      if (rows.length < 2) throw new Error("Planilha vazia ou apenas cabeçalho");

      const headers = rows[0];
      const idx = buildIndex(headers);

      if (idx.name === -1) {
        showError(
          "Cabeçalhos não reconhecidos",
          "Não encontrei uma coluna de nome do produto. Renomeie uma coluna para «nome», «produto», «item» ou «título». Cabeçalhos detectados:",
          headers.join(" | ")
        );
        return;
      }

      const items = rows.slice(1).map(r => {
        const name = (r[idx.name] || "").trim();
        if (!name) return null;
        // Prioridade: coluna 'link' (URL Drive completa) > coluna 'imagem' (pode ser só nome de arquivo)
        const rawLink  = idx.link  >= 0 ? (r[idx.link]  || "") : "";
        const rawImg   = idx.image >= 0 ? (r[idx.image] || "") : "";
        const priceRaw = idx.price >= 0 ? (r[idx.price] || "").trim() : "";
        return {
          name,
          category: (idx.category >= 0 ? r[idx.category] : "").trim() || null,
          desc: (idx.desc >= 0 ? r[idx.desc] : "").trim() || null,
          price: parsePrice(priceRaw),
          priceRaw: priceRaw || null,
          imageUrl: imageUrlFromDrive(rawLink, 600) || imageUrlFromDrive(rawImg, 600)
        };
      }).filter(Boolean);

      if (items.length === 0) {
        showError("Planilha sem dados", "A planilha foi lida, mas nenhuma linha tem nome de produto preenchido.");
        return;
      }

      state.items = items;
      renderFilters();
      renderGrid();

    } catch (err) {
      showError(
        "Não foi possível carregar a planilha",
        "Verifique se ela está publicada na web no formato CSV e se a URL no topo do arquivo está correta. Erro:",
        escapeHtml(err.message || String(err))
      );
    }
  }

  init();
})();
</script>
